<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; padding-bottom: 100px; }
        .page.active { display: block; }
        .nav-item.active { color: #3b82f6; border-top: 2px solid #3b82f6; }
        .scroll-list { max-height: 400px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        input, select, textarea { color: white !important; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-100 font-sans">

    <div id="bounty-banner" class="bg-gradient-to-r from-yellow-500 to-orange-600 text-black p-2 text-center hidden">
        <p class="text-[10px] font-black uppercase">🔥 BOUNTY: <span id="b-val"></span></p>
        <p id="b-terms" class="text-[9px] font-bold"></p>
    </div>

    <header class="p-4 flex justify-between items-center bg-slate-900/50 border-b border-white/5 sticky top-0 z-50 backdrop-blur-md">
        <h1 class="font-black italic text-xl">SHIFT<span class="text-blue-500">PRO</span></h1>
        <button onclick="openAdmin()" class="bg-red-500/20 text-red-400 px-4 py-1 rounded-full text-[10px] font-bold border border-red-500/30">ADMIN ⚡</button>
    </header>

    <main id="page-home" class="page active p-4 space-y-4">
        <div class="bg-blue-600 p-8 rounded-[2.5rem] shadow-2xl">
            <p class="text-xs font-bold opacity-70 uppercase tracking-widest">Shift Progress</p>
            <h2 id="h-total" class="text-5xl font-black my-2">$0</h2>
            <div class="bg-black/20 rounded-full h-2"><div id="h-bar" class="bg-white h-full rounded-full transition-all duration-1000"></div></div>
        </div>
        <div class="bg-slate-900/80 p-5 rounded-3xl border border-white/5">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-4">Recent Activity</h3>
            <div id="h-deals" class="scroll-list space-y-3"></div>
        </div>
    </main>

    <main id="page-stats" class="page p-4 space-y-4">
        <h2 class="text-xl font-bold">Performance</h2>
        <div id="stats-container" class="space-y-3"></div>
    </main>

    <main id="page-breaks" class="page p-4 space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <button onclick="takeBreak(45)" class="bg-orange-500/10 border border-orange-500/20 p-6 rounded-3xl text-orange-500 font-bold">🍔 BIG (45m)</button>
            <button onclick="takeBreak(15)" class="bg-blue-500/10 border border-blue-500/20 p-6 rounded-3xl text-blue-500 font-bold">☕ SMALL (15m)</button>
        </div>
        <div id="b-live" class="space-y-3"></div>
    </main>

    <nav class="fixed bottom-0 w-full bg-slate-900 border-t border-white/5 flex justify-around py-4 pb-8 z-50">
        <button onclick="nav('home')" id="n-home" class="nav-item active flex flex-col items-center gap-1"><span class="text-xl">🏠</span><span class="text-[10px] font-bold">HOME</span></button>
        <button onclick="nav('stats')" id="n-stats" class="nav-item flex flex-col items-center gap-1"><span class="text-xl">📊</span><span class="text-[10px] font-bold">STATS</span></button>
        <button onclick="nav('breaks')" id="n-breaks" class="nav-item flex flex-col items-center gap-1"><span class="text-xl">⏳</span><span class="text-[10px] font-bold">BREAKS</span></button>
    </nav>

    <button onclick="openDealModal()" class="fixed bottom-24 right-6 bg-blue-600 w-16 h-16 rounded-full shadow-2xl text-3xl font-bold z-40">+</button>

    <div id="m-deal" class="fixed inset-0 bg-[#0f172a] z-[100] hidden p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8"><h2 id="m-deal-title" class="text-2xl font-black">Register Deal</h2><button onclick="closeDealModal()" class="text-2xl">✕</button></div>
        <div class="space-y-4">
            <input id="f-cid" type="text" placeholder="Client ID" class="w-full p-4 bg-slate-900 rounded-2xl border border-white/10 outline-none">
            <input id="f-email" type="email" placeholder="Client Email" class="w-full p-4 bg-slate-900 rounded-2xl border border-white/10 outline-none">
            <input id="f-amt" type="number" placeholder="Amount ($)" class="w-full p-4 bg-slate-900 rounded-2xl border border-white/10 outline-none">
            <div class="grid grid-cols-2 gap-2">
                <select id="f-type" class="p-4 bg-slate-900 rounded-2xl border border-white/10"><option>FTD</option><option>Deposit</option></select>
                <select id="f-method" class="p-4 bg-slate-900 rounded-2xl border border-white/10"><option>Crypto</option><option>Wire</option><option>Stripe</option></select>
            </div>
            <button id="deal-submit-btn" onclick="submitDeal()" class="w-full bg-blue-600 py-5 rounded-3xl font-black text-xl">SUBMIT DEAL</button>
            <button id="deal-delete-btn" onclick="deleteDeal()" class="w-full bg-red-600/20 text-red-500 py-3 rounded-3xl font-bold hidden">DELETE TRANSACTION</button>
        </div>
    </div>

    <div id="m-admin" class="fixed inset-0 bg-[#0f172a] z-[200] hidden p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6 text-red-500 font-black text-2xl"><h2>ADMIN PANEL</h2><button onclick="toggleModal('m-admin', false)" class="text-white">✕</button></div>
        
        <div class="space-y-8">
            <div class="bg-slate-900 p-5 rounded-3xl space-y-4 border border-white/5">
                <p class="text-xs font-bold text-slate-500 uppercase">Bounty & Goals</p>
                <input id="a-b-amt" type="number" placeholder="Bounty Amount ($)" class="w-full p-4 bg-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <textarea id="a-b-terms" placeholder="Bounty Terms..." class="w-full p-4 bg-slate-800 rounded-2xl h-24 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <input id="a-goal" type="number" placeholder="Shift Goal ($)" class="w-full p-4 bg-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="saveAdminConfig()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold">SAVE CONFIGURATION</button>
            </div>

            <div class="bg-slate-900 p-5 rounded-3xl space-y-4 border border-white/5">
                <p class="text-xs font-bold text-slate-500 uppercase">Live Break Control</p>
                <div id="a-active-breaks" class="space-y-2"></div>
                <button onclick="resetBreaks(null)" class="w-full bg-red-600/20 text-red-500 py-4 rounded-2xl font-bold border border-red-500/20">RESET ALL TIMERS</button>
            </div>

            <div class="bg-slate-900 p-5 rounded-3xl border border-white/5">
                <p class="text-xs font-bold text-slate-500 uppercase mb-4">Break History Log</p>
                <div id="a-b-history" class="space-y-2 text-[11px]"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let cache = null;
        let adminPass = '';
        let currentEditId = null;

        async function refresh() {
            const res = await fetch('/api/dashboard');
            cache = await res.json();
            renderHome();
            renderStats();
            renderBreaks();
            if(!document.getElementById('m-admin').classList.contains('hidden')) renderAdminStuff();
        }

        function renderHome() {
            const today = new Date().toISOString().split('T')[0];
            const daily = cache.deals.filter(d => d.created_at.startsWith(today));
            const total = daily.reduce((s, d) => s + d.amount, 0);
            
            document.getElementById('h-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('h-bar').style.width = `${Math.min((total/cache.config.goal)*100, 100)}%`;

            if(cache.config.bounty_amt > 0) {
                document.getElementById('bounty-banner').classList.remove('hidden');
                document.getElementById('b-val').innerText = `$${cache.config.bounty_amt}`;
                document.getElementById('b-terms').innerText = cache.config.bounty_terms;
            } else {
                document.getElementById('bounty-banner').classList.add('hidden');
            }

            document.getElementById('h-deals').innerHTML = daily.map(d => `
                <div onclick="openDealModal(${d.id})" class="bg-slate-800/40 p-4 rounded-2xl flex justify-between items-center border border-white/5 active:scale-95 transition-transform">
                    <div><p class="font-bold text-sm">${d.agent_name}</p><p class="text-[10px] text-slate-500">${d.deal_type} • ${d.payment_method}</p></div>
                    <p class="font-black text-blue-400">+$${d.amount}</p>
                </div>
            `).join('') || '<p class="text-center opacity-30 py-10">Waiting for first deal...</p>';
        }

        function renderStats() {
            const agents = {};
            cache.deals.forEach(d => {
                if(!agents[d.agent_name]) agents[d.agent_name] = 0;
                agents[d.agent_name] += d.amount;
            });
            document.getElementById('stats-container').innerHTML = Object.entries(agents).sort((a,b)=>b[1]-a[1]).map(([name, amt], i) => `
                <div class="bg-slate-900 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <span class="font-bold">${i+1}. ${name}</span>
                    <span class="text-blue-400 font-black">$${amt.toLocaleString()}</span>
                </div>
            `).join('');
        }

        function renderBreaks() {
            document.getElementById('b-live').innerHTML = cache.active_breaks.map(b => `
                <div class="bg-slate-900 p-5 rounded-3xl border border-white/5 flex justify-between items-center">
                    <span class="font-bold text-sm">${b.agent_name}</span>
                    <span class="text-orange-400 font-mono font-bold timer" data-start="${new Date(b.start_time).getTime()}" data-total="${b.duration*60}">--:--</span>
                </div>
            `).join('') || '<p class="text-center opacity-30 py-10">No active breaks</p>';
        }

        function renderAdminStuff() {
            document.getElementById('a-active-breaks').innerHTML = cache.active_breaks.map(b => `
                <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl text-xs">
                    <span>${b.agent_name} (${b.duration}m)</span>
                    <button onclick="resetBreaks(${b.user_id})" class="text-red-500 font-bold">RESET</button>
                </div>
            `).join('');

            document.getElementById('a-b-history').innerHTML = cache.history.map(h => `
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span>${h.agent_name} took ${h.duration}m</span>
                    <span class="opacity-40">${new Date(h.started_at).toLocaleTimeString()}</span>
                </div>
            `).join('');
        }

        function openDealModal(id = null) {
            currentEditId = id;
            document.getElementById('m-deal').classList.remove('hidden');
            if(id) {
                const d = cache.deals.find(x => x.id === id);
                document.getElementById('m-deal-title').innerText = "Edit Transaction";
                document.getElementById('f-cid').value = d.client_id;
                document.getElementById('f-email').value = d.client_email || '';
                document.getElementById('f-amt').value = d.amount;
                document.getElementById('f-type').value = d.deal_type || 'FTD';
                document.getElementById('f-method').value = d.payment_method;
                document.getElementById('deal-submit-btn').innerText = "SAVE CHANGES";
                document.getElementById('deal-delete-btn').classList.remove('hidden');
            } else {
                document.getElementById('m-deal-title').innerText = "Register Deal";
                document.getElementById('deal-submit-btn').innerText = "SUBMIT DEAL";
                document.getElementById('deal-delete-btn').classList.add('hidden');
                document.querySelectorAll('#m-deal input').forEach(i => i.value = '');
            }
        }

        function closeDealModal() { document.getElementById('m-deal').classList.add('hidden'); }

        async function submitDeal() {
            const body = {
                agent_name: tg.initDataUnsafe.user?.first_name || "Agent",
                amount: parseFloat(document.getElementById('f-amt').value),
                client_id: document.getElementById('f-cid').value,
                client_email: document.getElementById('f-email').value,
                deal_type: document.getElementById('f-type').value,
                payment_method: document.getElementById('f-method').value
            };
            const url = currentEditId ? `/api/admin/deal/${currentEditId}?password=${adminPass || '13012'}` : '/api/deal';
            const method = currentEditId ? 'PUT' : 'POST';
            
            await fetch(url, {method: method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
            closeDealModal();
            refresh();
        }

        async function deleteDeal() {
            if(!confirm("Delete this transaction?")) return;
            await fetch(`/api/admin/deal/${currentEditId}?password=${adminPass}`, {method:'DELETE'});
            closeDealModal();
            refresh();
        }

        async function resetBreaks(uid) {
            await fetch('/api/admin/reset-breaks', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password: adminPass, user_id: uid})});
            refresh();
        }

        async function openAdmin() {
            adminPass = prompt("Admin Password:");
            if(adminPass === "13012") {
                document.getElementById('a-goal').value = cache.config.goal;
                document.getElementById('a-b-amt').value = cache.config.bounty_amt;
                document.getElementById('a-b-terms').value = cache.config.bounty_terms;
                toggleModal('m-admin', true);
                renderAdminStuff();
            }
        }

        async function saveAdminConfig() {
            const config = {
                goal: parseInt(document.getElementById('a-goal').value),
                bounty_amt: parseInt(document.getElementById('a-b-amt').value),
                bounty_terms: document.getElementById('a-b-terms').value
            };
            await fetch('/api/admin/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password: adminPass, config: config})});
            tg.showAlert("Global Config Saved!");
            refresh();
        }

        async function takeBreak(m) {
            const b = {user_id: tg.initDataUnsafe.user?.id || 999, agent_name: tg.initDataUnsafe.user?.first_name || "Agent", duration: m, start_time: new Date().toISOString()};
            await fetch('/api/break', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)});
            refresh();
        }

        function tick() {
            document.querySelectorAll('.timer').forEach(el => {
                const elapsed = Math.floor((Date.now() - parseInt(el.dataset.start)) / 1000);
                const rem = Math.max(0, parseInt(el.dataset.total) - elapsed);
                el.innerText = `${Math.floor(rem/60).toString().padStart(2, '0')}:${(rem%60).toString().padStart(2, '0')}`;
                if(rem === 0) el.classList.replace('text-orange-400', 'text-red-500');
            });
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`page-${p}`).classList.add('active');
            document.getElementById(`n-${p}`).classList.add('active');
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }
        
        setInterval(refresh, 10000);
        setInterval(tick, 1000);
        refresh();
    </script>
</body>
</html>
