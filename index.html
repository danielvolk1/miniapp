<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans p-4">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black text-blue-500">DASHBOARD</h1>
        <button onclick="openAdmin()" class="bg-slate-800 px-4 py-1 rounded-full text-xs">ADMIN ⚙️</button>
    </div>

    <div class="bg-blue-600 p-8 rounded-[2rem] shadow-xl mb-6">
        <p class="text-xs font-bold opacity-80">DAILY TOTAL</p>
        <h2 id="total-val" class="text-5xl font-black">$0</h2>
    </div>

    <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 space-y-4">
        <input id="c_id" type="text" placeholder="Client ID" class="w-full p-4 bg-slate-800 rounded-2xl outline-none">
        <input id="c_email" type="email" placeholder="Client Email" class="w-full p-4 bg-slate-800 rounded-2xl outline-none">
        <input id="amount" type="number" placeholder="Amount ($)" class="w-full p-4 bg-slate-800 rounded-2xl outline-none">
        <div class="grid grid-cols-2 gap-2">
            <select id="type" class="p-4 bg-slate-800 rounded-2xl"><option>FTD</option><option>Deposit</option></select>
            <select id="method" class="p-4 bg-slate-800 rounded-2xl"><option>Crypto</option><option>Wire</option><option>Stripe</option></select>
        </div>
        <button onclick="sendDeal()" class="w-full bg-white text-black py-4 rounded-2xl font-bold">SUBMIT</button>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/95 z-[100] hidden p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold text-red-500">ADMIN PANEL</h2>
            <button onclick="closeAdmin()">✕</button>
        </div>
        <div class="space-y-6">
            <div class="bg-slate-900 p-4 rounded-xl">
                <p class="text-sm mb-2">Modify Target ($)</p>
                <input id="target" type="number" class="w-full p-3 bg-slate-800 rounded-lg" value="10000">
            </div>
            <p class="text-slate-500 italic text-sm">More admin tools (delete/edit) loading...</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openAdmin() {
            const pass = prompt("Enter Admin Password:");
            if (pass === "13012") {
                document.getElementById('admin-panel').classList.remove('hidden');
                tg.HapticFeedback.impactOccurred('heavy');
            } else {
                alert("Access Denied");
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
        }

        async function sendDeal() {
            const data = {
                agent_name: tg.initDataUnsafe.user.first_name,
                client_id: document.getElementById('c_id').value,
                client_email: document.getElementById('c_email').value,
                amount: parseFloat(document.getElementById('amount').value),
                deal_type: document.getElementById('type').value,
                payment_method: document.getElementById('method').value
            };
            await fetch('/api/deal', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            tg.showAlert("Deal Registered!");
            updateStats();
        }

        async function updateStats() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('total-val').innerText = `$${data.total.toLocaleString()}`;
        }
        updateStats();
    </script>
</body>
</html>
