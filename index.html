<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --accent: #3b82f6; }
        .theme-green { --bg: #022c22; --panel: #064e3b; --text: #ecfdf5; --accent: #10b981; }
        .theme-amoled { --bg: #000000; --panel: #0a0a0a; --text: #ffffff; --accent: #3b82f6; border-color: #333 !important; }
        
        body { background: var(--bg); color: var(--text); overflow-y: auto; -webkit-overflow-scrolling: touch; transition: all 0.3s; }
        .panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.05); }
        .page { display: none; padding: 16px; padding-bottom: 120px; min-height: 100vh; }
        .page.active { display: block; }
        
        input, select, textarea { pointer-events: auto !important; user-select: text !important; background: rgba(0,0,0,0.2) !important; color: var(--text) !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        .nav-item.active { color: var(--accent); }
        .avatar { display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--accent); color: white; font-weight: black; }
    </style>
</head>
<body class="font-sans">

    <header class="flex justify-between items-center px-4 py-3 panel sticky top-0 z-50 backdrop-blur-md">
        <div class="flex flex-col">
            <h1 class="font-black italic text-lg leading-tight flex items-center gap-2">
                SHIFT<span style="color: var(--accent)">PRO</span>
                <span id="conn-status" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            </h1>
            <span id="live-clock" class="text-[9px] opacity-70 font-mono">00:00:00</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleAudio()" id="btn-audio" class="p-2 rounded-lg text-xs panel">🔊</button>
            <button onclick="toggleTheme()" class="p-2 rounded-lg text-xs panel">🎨</button>
            <button onclick="openAdmin()" class="bg-red-500/10 text-red-500 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-red-500/20">ADMIN</button>
        </div>
    </header>

    <main id="page-home" class="page active">
        <div class="p-6 rounded-3xl shadow-xl mb-4 text-white relative overflow-hidden" style="background: var(--accent)">
            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Shift Total</p>
            <h2 id="h-total" class="text-4xl font-black mb-2">$0</h2>
            <div class="bg-black/20 rounded-full h-1.5"><div id="h-bar" class="bg-white h-full rounded-full transition-all duration-700 w-0"></div></div>
        </div>
        <div class="flex gap-2 mb-4 relative">
            <input type="text" id="deal-search" oninput="saveSearch()" placeholder="🔍 Search ID/Email..." class="flex-1 p-3 rounded-xl text-sm outline-none">
            <button onclick="clearSearch()" class="absolute right-3 top-3 opacity-50 font-bold">✕</button>
        </div>
        <div id="h-deals" class="space-y-3"></div>
    </main>

    <main id="page-stats" class="page">
        <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="panel p-5 rounded-2xl">
                <p class="text-[10px] opacity-50 font-bold uppercase">Avg Deal</p>
                <p id="s-avg" class="text-xl font-black" style="color: var(--accent)">$0</p>
            </div>
            <div class="panel p-5 rounded-2xl">
                <p class="text-[10px] opacity-50 font-bold uppercase">Total Deals</p>
                <p id="s-count" class="text-xl font-black text-emerald-400">0</p>
            </div>
        </div>
        <h3 class="text-xs font-bold opacity-50 uppercase mb-3 ml-2">Leaderboard</h3>
        <div id="stats-container" class="space-y-2"></div>
    </main>

    <main id="page-breaks" class="page">
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="takeBreak('big')" class="panel p-5 rounded-3xl text-sm font-bold border-l-4 border-blue-500 flex flex-col items-start gap-1">
                <span>🍽️ Big Break</span><span class="text-[9px] opacity-50 font-normal">1 Session (45m)</span>
            </button>
            <button onclick="takeBreak('small')" class="panel p-5 rounded-3xl text-sm font-bold border-l-4 border-orange-500 flex flex-col items-start gap-1">
                <span>☕ Small Break</span><span class="text-[9px] opacity-50 font-normal">Pool (45m max)</span>
            </button>
        </div>
        
        <div class="panel rounded-3xl p-5 mb-4">
            <h3 class="text-xs font-bold opacity-50 uppercase mb-4">Active Timers</h3>
            <div id="b-live" class="space-y-3"></div>
        </div>

        <div class="panel rounded-3xl p-5">
            <h3 class="text-xs font-bold opacity-50 uppercase mb-4">Remaining Break Quotas</h3>
            <div class="overflow-hidden rounded-xl border border-white/5">
                <table class="w-full text-left text-xs">
                    <thead class="bg-black/20 text-[9px] uppercase opacity-60"><tr><th class="p-3">Agent</th><th class="p-3">Big Left</th><th class="p-3">Small Left</th></tr></thead>
                    <tbody id="b-quota" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full panel flex justify-around py-3 pb-8 z-50">
        <button onclick="nav('home')" id="n-home" class="nav-item active flex flex-col items-center gap-1"><span class="text-xl">🏠</span><span class="text-[9px] font-bold">HOME</span></button>
        <button onclick="nav('stats')" id="n-stats" class="nav-item flex flex-col items-center gap-1"><span class="text-xl">📊</span><span class="text-[9px] font-bold">STATS</span></button>
        <button onclick="nav('breaks')" id="n-breaks" class="nav-item flex flex-col items-center gap-1"><span class="text-xl">⏳</span><span class="text-[9px] font-bold">BREAKS</span></button>
    </nav>

    <button onclick="openDealModal()" class="fixed bottom-24 right-5 w-14 h-14 rounded-full shadow-xl text-3xl font-black flex items-center justify-center z-40 text-white" style="background: var(--accent)">+</button>

    <div id="m-deal" class="fixed inset-0 bg-black/90 z-[100] hidden p-5 overflow-y-auto backdrop-blur-sm">
        <div class="panel p-6 rounded-[2rem] mt-10">
            <div class="flex justify-between items-center mb-6"><h2 id="m-deal-title" class="text-xl font-black">Transaction</h2><button onclick="closeModal('m-deal')" class="text-xl">✕</button></div>
            <div class="space-y-4">
                <input id="f-cid" type="text" placeholder="Client ID" class="w-full p-4 rounded-xl">
                <input id="f-email" type="email" placeholder="Client Email" class="w-full p-4 rounded-xl">
                
                <div class="relative">
                    <input id="f-amt" type="number" placeholder="Amount ($)" class="w-full p-4 rounded-xl text-lg font-black">
                    <div class="flex gap-2 mt-2">
                        <button onclick="addAmt(50)" class="bg-white/10 px-3 py-1 rounded-full text-[10px] font-bold">+50</button>
                        <button onclick="addAmt(100)" class="bg-white/10 px-3 py-1 rounded-full text-[10px] font-bold">+100</button>
                        <button onclick="addAmt(250)" class="bg-white/10 px-3 py-1 rounded-full text-[10px] font-bold">+250</button>
                        <button onclick="addAmt(500)" class="bg-white/10 px-3 py-1 rounded-full text-[10px] font-bold">+500</button>
                    </div>
                </div>

                <div class="flex gap-2">
                    <select id="f-type" class="flex-1 p-4 rounded-xl"><option>FTD</option><option>Deposit</option></select>
                    <select id="f-method" class="flex-1 p-4 rounded-xl"><option>Crypto</option><option>Wire</option><option>Stripe</option></select>
                </div>
                <textarea id="f-notes" placeholder="Notes/TxID (Optional)" class="w-full p-4 rounded-xl h-20 text-sm"></textarea>
                
                <button id="deal-submit-btn" onclick="submitDeal()" class="w-full py-4 rounded-xl font-black text-white shadow-lg" style="background: var(--accent)">CONFIRM</button>
                <div class="grid grid-cols-2 gap-2 hidden" id="deal-edit-actions">
                    <button onclick="duplicateDeal()" class="bg-blue-900/40 text-blue-400 py-3 rounded-xl font-bold text-xs border border-blue-500/20">📄 DUPLICATE</button>
                    <button onclick="deleteDeal()" class="bg-red-900/40 text-red-500 py-3 rounded-xl font-bold text-xs border border-red-500/20">🗑 DELETE</button>
                </div>
            </div>
        </div>
    </div>

    <div id="m-admin" class="fixed inset-0 bg-black/90 z-[200] hidden p-5 overflow-y-auto backdrop-blur-sm">
        <div class="panel p-6 rounded-[2rem] mt-10 space-y-6">
            <div class="flex justify-between items-center"><h2 class="text-xl font-black text-red-500">Admin</h2><button onclick="closeModal('m-admin')" class="text-xl">✕</button></div>
            
            <button onclick="generateReport()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-white shadow-lg">📋 GENERATE SHIFT REPORT</button>

            <div class="space-y-3">
                <p class="text-[10px] font-bold opacity-50 uppercase flex justify-between"><span>Shift Goal</span> <span id="goal-val">$10,000</span></p>
                <input id="a-goal" type="range" min="1000" max="100000" step="1000" oninput="updateGoalText(this.value)" class="w-full">
                <button onclick="saveAdminConfig()" class="w-full py-3 rounded-xl font-bold text-white" style="background: var(--accent)">SAVE CONFIG</button>
            </div>
            <div class="space-y-3">
                <button onclick="exportCSV('deals')" class="w-full bg-emerald-600 py-3 rounded-xl font-bold text-[10px] text-white">📥 DOWNLOAD RAW DEAL DATA</button>
                <button onclick="resetBreaks()" class="w-full bg-red-900/40 text-red-500 border border-red-500/20 py-3 rounded-xl font-bold">CLEAR ALL TIMERS</button>
            </div>
        </div>
    </div>

    <audio id="chime" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let cache = { deals: [], active_breaks: [], break_logs: [], config: { goal: 10000 } };
        let adminPass = '';
        let currentEditId = null;
        let savedSearch = '';
        const themes = ['dark', 'theme-green', 'theme-amoled'];
        let themeIndex = 0;
        let audioMuted = false;

        window.addEventListener('online', () => document.getElementById('conn-status').className = 'w-2 h-2 rounded-full bg-emerald-500 animate-pulse');
        window.addEventListener('offline', () => document.getElementById('conn-status').className = 'w-2 h-2 rounded-full bg-red-500');

        async function refresh() {
            try {
                const res = await fetch('/api/dashboard');
                cache = await res.json();
                renderHome(); renderStats(); renderBreaks();
            } catch(e) { console.log("Offline or error"); }
        }

        function getInitials(name) { return name.substring(0,2).toUpperCase(); }
        function timeAgo(dateStr) {
            const seconds = Math.floor((new Date() - new Date(dateStr)) / 1000);
            if(seconds < 60) return "Just now";
            const mins = Math.floor(seconds/60);
            if(mins < 60) return `${mins}m ago`;
            return `${Math.floor(mins/60)}h ago`;
        }
        function addAmt(val) { 
            const el = document.getElementById('f-amt'); 
            el.value = (parseFloat(el.value) || 0) + val; 
        }

        function renderHome() {
            const today = new Date().toISOString().split('T')[0];
            let daily = cache.deals.filter(d => d.created_at.startsWith(today));
            
            const total = daily.reduce((s, d) => s + d.amount, 0);
            document.getElementById('h-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('h-bar').style.width = `${Math.min((total/cache.config.goal)*100, 100)}%`;
            
            if(savedSearch) daily = daily.filter(d => d.client_id.toLowerCase().includes(savedSearch) || d.client_email.toLowerCase().includes(savedSearch) || d.agent_name.toLowerCase().includes(savedSearch));

            document.getElementById('h-deals').innerHTML = daily.map(d => `
                <div onclick="openDealModal(${d.id})" class="panel p-4 rounded-2xl flex justify-between items-center active:scale-95 transition-transform">
                    <div class="flex items-center gap-3">
                        <div class="avatar w-10 h-10 text-xs shadow-lg">${getInitials(d.agent_name)}</div>
                        <div>
                            <p class="text-sm font-bold">${d.agent_name} <span class="text-[9px] font-normal opacity-50 ml-1">${timeAgo(d.created_at)}</span></p>
                            <p class="text-[10px] opacity-60 uppercase">${d.deal_type} • ${d.client_id}</p>
                        </div>
                    </div>
                    <p class="font-black text-lg" style="color: var(--accent)">+$${d.amount.toLocaleString()}</p>
                </div>
            `).join('') || '<p class="text-center opacity-30 py-10 text-xs">No transactions</p>';
        }

        function renderStats() {
            const today = new Date().toISOString().split('T')[0];
            const daily = cache.deals.filter(d => d.created_at.startsWith(today));
            const agents = {};
            daily.forEach(d => { agents[d.agent_name] = (agents[d.agent_name] || 0) + d.amount; });
            const sorted = Object.entries(agents).sort((a,b) => b[1] - a[1]);

            document.getElementById('stats-container').innerHTML = sorted.map(([name, amt], i) => `
                <div class="panel p-4 rounded-2xl flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <span class="text-sm w-4">${i === 0 ? '🥇' : i+1}</span>
                        <span class="text-sm font-bold">${name}</span>
                    </div>
                    <span class="font-black text-sm" style="color: var(--accent)">$${amt.toLocaleString()}</span>
                </div>
            `).join('');
            
            document.getElementById('s-count').innerText = daily.length;
            document.getElementById('s-avg').innerText = `$${daily.length ? (daily.reduce((s,d)=>s+d.amount,0)/daily.length).toFixed(0) : 0}`;
        }

        // --- NEW BREAK LOGIC ---
        function renderBreaks() {
            const usage = {};
            const today = new Date().toISOString().split('T')[0];
            
            // Build Base Agent List & Completed Usage
            cache.break_logs.filter(b => b.created_at.startsWith(today)).forEach(b => {
                usage[b.agent_name] = usage[b.agent_name] || { big: 0, small: 0 };
                usage[b.agent_name][b.break_type] += b.duration;
            });

            // Live Timers with specific Pool counting
            document.getElementById('b-live').innerHTML = cache.active_breaks.map(b => {
                usage[b.agent_name] = usage[b.agent_name] || { big: 0, small: 0 }; // Ensure agent exists in usage
                
                // Max pool for the type being taken
                const poolMax = 45; 
                const alreadyUsed = usage[b.agent_name][b.break_type];
                
                return `
                <div class="flex justify-between items-center p-3 panel rounded-xl border border-white/5">
                    <div>
                        <span class="text-xs font-bold block">${b.agent_name}</span>
                        <span class="text-[9px] opacity-50 uppercase">${b.break_type} Break</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-mono text-sm font-bold timer text-emerald-400" 
                              data-start="${new Date(b.start_time).getTime()}" 
                              data-used="${alreadyUsed}" 
                              data-max="${poolMax}">--:--</span>
                        <button onclick="endBreak('${b.user_id}')" class="text-[10px] bg-red-500 text-white px-3 py-2 rounded-lg font-bold">STOP</button>
                    </div>
                </div>
            `}).join('') || '<p class="text-[10px] opacity-30 text-center py-2">No active breaks</p>';

            // Quota Table Calculation
            document.getElementById('b-quota').innerHTML = Object.entries(usage).map(([name, data]) => {
                // Determine active break to estimate current burn
                const active = cache.active_breaks.find(a => a.agent_name === name);
                let currentBurnBig = 0, currentBurnSmall = 0;
                if(active) {
                    const burn = Math.floor((Date.now() - new Date(active.start_time).getTime()) / 60000);
                    if(active.break_type === 'big') currentBurnBig = burn;
                    if(active.break_type === 'small') currentBurnSmall = burn;
                }

                const bigLeft = Math.max(0, 45 - data.big - currentBurnBig);
                const smallLeft = Math.max(0, 45 - data.small - currentBurnSmall);

                return `<tr>
                    <td class="p-3 font-bold">${name}</td>
                    <td class="p-3 ${bigLeft <= 5 ? 'text-red-500' : 'text-blue-400'} font-mono">${bigLeft}m</td>
                    <td class="p-3 ${smallLeft <= 5 ? 'text-red-500' : 'text-orange-400'} font-mono">${smallLeft}m</td>
                </tr>`;
            }).join('') || '<tr><td colspan="3" class="text-center p-4 opacity-30 text-[10px]">No breaks taken</td></tr>';
        }

        function tick() {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
            document.querySelectorAll('.timer').forEach(el => {
                const elapsedMins = (Date.now() - parseInt(el.dataset.start)) / 60000;
                const totalUsedSoFar = parseFloat(el.dataset.used) + elapsedMins;
                let remainingMins = parseFloat(el.dataset.max) - totalUsedSoFar;
                
                if (remainingMins < 0) {
                    el.classList.replace('text-emerald-400', 'text-red-500');
                    el.classList.add('animate-pulse');
                    const over = Math.abs(remainingMins);
                    el.innerText = `-${Math.floor(over).toString().padStart(2,'0')}:${Math.floor((over%1)*60).toString().padStart(2,'0')}`;
                } else {
                    el.innerText = `${Math.floor(remainingMins).toString().padStart(2,'0')}:${Math.floor((remainingMins%1)*60).toString().padStart(2,'0')}`;
                }
            });
            // Re-render quotas every minute roughly to keep table updated
            if(new Date().getSeconds() === 0) renderBreaks(); 
        }

        // --- Core Interactions ---
        function openDealModal(id = null) {
            currentEditId = id;
            document.getElementById('m-deal').classList.remove('hidden');
            if(id) {
                const d = cache.deals.find(x => x.id === id);
                document.getElementById('m-deal-title').innerText = "Edit Deal";
                document.getElementById('f-cid').value = d.client_id; document.getElementById('f-email').value = d.client_email;
                document.getElementById('f-amt').value = d.amount; document.getElementById('f-type').value = d.deal_type;
                document.getElementById('f-method').value = d.payment_method; document.getElementById('f-notes').value = d.notes || "";
                document.getElementById('deal-submit-btn').innerText = "UPDATE";
                document.getElementById('deal-edit-actions').classList.remove('hidden');
            } else {
                document.getElementById('m-deal-title').innerText = "New Deal";
                document.getElementById('deal-submit-btn').innerText = "CONFIRM";
                document.getElementById('deal-edit-actions').classList.add('hidden');
                document.querySelectorAll('#m-deal input, #m-deal textarea').forEach(i => i.value = '');
            }
        }

        async function submitDeal(isDup = false) {
            const amt = parseFloat(document.getElementById('f-amt').value);
            const body = {
                agent_name: tg.initDataUnsafe.user?.first_name || "Agent", amount: amt,
                client_id: document.getElementById('f-cid').value, client_email: document.getElementById('f-email').value,
                deal_type: document.getElementById('f-type').value, payment_method: document.getElementById('f-method').value,
                notes: document.getElementById('f-notes').value
            };
            
            const isPut = currentEditId && !isDup;
            const url = isPut ? `/api/admin/deal/${currentEditId}?password=${adminPass || '13012'}` : '/api/deal';
            await fetch(url, {method: isPut ? 'PUT' : 'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
            
            if(amt >= 1000) confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } }); // Feature: Whale Confetti
            if(!audioMuted) document.getElementById('chime').play().catch(()=>{});
            tg.HapticFeedback.notificationOccurred('success');
            closeModal('m-deal'); refresh();
        }

        function duplicateDeal() { submitDeal(true); }
        async function deleteDeal() {
            if(!adminPass) adminPass = prompt("Admin Pass:");
            if(!confirm("Delete?")) return;
            await fetch(`/api/admin/deal/${currentEditId}?password=${adminPass}`, {method:'DELETE'});
            closeModal('m-deal'); refresh();
        }

        async function takeBreak(type) {
            const b = {user_id: tg.initDataUnsafe.user?.id || Date.now(), agent_name: tg.initDataUnsafe.user?.first_name || "Agent", break_type: type };
            await fetch('/api/break', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)});
            refresh();
        }
        async function endBreak(uid) {
            await fetch('/api/break/end', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id: uid})});
            refresh();
        }

        // --- Admin ---
        function openAdmin() {
            if(!adminPass) adminPass = prompt("Admin Key:");
            if(adminPass === "13012") {
                document.getElementById('a-goal').value = cache.config.goal || 10000;
                updateGoalText(cache.config.goal || 10000);
                document.getElementById('m-admin').classList.remove('hidden');
            }
        }

        function generateReport() {
            const today = new Date().toISOString().split('T')[0];
            const daily = cache.deals.filter(d => d.created_at.startsWith(today));
            const total = daily.reduce((s, d) => s + d.amount, 0);
            
            const agents = {};
            daily.forEach(d => { agents[d.agent_name] = (agents[d.agent_name] || 0) + d.amount; });
            const topAgent = Object.entries(agents).sort((a,b) => b[1] - a[1])[0];
            
            const report = `📊 *SHIFT SUMMARY*\n💰 Total Revenue: $${total.toLocaleString()}\n🎯 Shift Goal: ${((total/cache.config.goal)*100).toFixed(1)}%\n🥇 Top Agent: ${topAgent ? topAgent[0] + ' ($'+topAgent[1].toLocaleString()+')' : 'N/A'}\n📦 Total Deals: ${daily.length}`;
            navigator.clipboard.writeText(report);
            tg.showAlert("Shift Report Copied to Clipboard!");
        }

        function updateGoalText(val) { document.getElementById('goal-val').innerText = `$${parseInt(val).toLocaleString()}`; }
        async function saveAdminConfig() {
            await fetch('/api/admin/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password: adminPass, config: {goal: parseInt(document.getElementById('a-goal').value)}})});
            closeModal('m-admin'); refresh();
        }

        // --- Utils ---
        function clearSearch() { document.getElementById('deal-search').value = ''; saveSearch(); }
        function saveSearch() { savedSearch = document.getElementById('deal-search').value.toLowerCase(); renderHome(); }
        function toggleAudio() { audioMuted = !audioMuted; document.getElementById('btn-audio').innerText = audioMuted ? '🔇' : '🔊'; }
        function toggleTheme() {
            document.body.classList.remove(themes[themeIndex]);
            themeIndex = (themeIndex + 1) % themes.length;
            if(themes[themeIndex] !== 'dark') document.body.classList.add(themes[themeIndex]);
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function nav(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`page-${p}`).classList.add('active');
            document.getElementById(`n-${p}`).classList.add('active');
        }
        
        setInterval(refresh, 15000);
        setInterval(tick, 1000);
        refresh();
    </script>
</body>
</html>
