<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .page { display: none; padding-bottom: 120px; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-item.active { color: #3b82f6; border-top: 2px solid #3b82f6; }
        .scroll-list { max-height: 380px; overflow-y: auto; scrollbar-width: none; }
        .scroll-list::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans">

    <div id="bounty-banner" class="bg-gradient-to-r from-yellow-500 to-orange-600 text-black p-2 text-center hidden">
        <p class="text-[10px] font-black uppercase tracking-tighter">🔥 ACTIVE BOUNTY: <span id="b-val" class="text-xs">$50</span></p>
        <p id="b-terms" class="text-[9px] font-bold leading-none"></p>
    </div>

    <header class="p-4 flex justify-between items-center bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <h1 class="font-black text-xl italic tracking-tighter">SHIFT<span class="text-blue-500">PRO</span></h1>
        <button onclick="openAdmin()" class="bg-slate-800 px-3 py-1 rounded-full text-[10px] font-bold border border-slate-700">ADMIN</button>
    </header>

    <main id="page-home" class="page active p-4 space-y-4">
        <div class="bg-blue-600 p-6 rounded-[2rem] shadow-xl">
            <p class="text-[10px] font-bold opacity-70">DAILY REVENUE</p>
            <h2 id="h-total" class="text-4xl font-black">$0</h2>
            <div class="mt-4 bg-black/20 rounded-full h-1.5"><div id="h-bar" class="bg-white h-full rounded-full transition-all" style="width: 0%"></div></div>
        </div>

        <div class="bg-slate-900 p-4 rounded-3xl border border-slate-800">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-3">Recent Activity</h3>
            <div id="h-deals" class="scroll-list space-y-2"></div>
        </div>
    </main>

    <main id="page-breaks" class="page p-4 space-y-4">
        <div class="grid grid-cols-2 gap-2">
            <button onclick="takeBreak(45)" class="bg-slate-900 p-4 rounded-2xl border border-orange-500/20 text-orange-500 font-bold">🍔 BIG (45m)</button>
            <button onclick="takeBreak(15)" class="bg-slate-900 p-4 rounded-2xl border border-blue-500/20 text-blue-500 font-bold">☕ SMALL (15m)</button>
        </div>
        <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800">
            <h3 class="font-bold mb-4 flex justify-between items-center text-sm">Live Breaks <button onclick="endMyBreak()" class="text-[9px] text-red-400">END MY BREAK</button></h3>
            <div id="b-live" class="space-y-3"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-slate-900 border-t border-slate-800 flex justify-around py-3 pb-8 z-50">
        <button onclick="nav('home')" id="n-home" class="nav-item active flex flex-col items-center gap-1 px-4"><span class="text-xl">🏠</span><span class="text-[10px] font-bold">HOME</span></button>
        <button onclick="nav('breaks')" id="n-breaks" class="nav-item flex flex-col items-center gap-1 text-slate-500 px-4"><span class="text-xl">☕</span><span class="text-[10px] font-bold">BREAKS</span></button>
    </nav>

    <button onclick="toggleModal('m-deal', true)" class="fixed bottom-24 right-6 bg-blue-600 w-14 h-14 rounded-full shadow-2xl text-2xl font-bold z-40">+</button>

    <div id="m-admin" class="fixed inset-0 bg-slate-950 z-[100] hidden p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-black text-red-500">ADMIN</h2><button onclick="toggleModal('m-admin', false)">✕</button></div>
        
        <div class="space-y-6">
            <div class="bg-slate-900 p-4 rounded-2xl space-y-3">
                <p class="text-[10px] font-bold text-slate-500">BOUNTY MANAGEMENT</p>
                <input id="a-b-amt" type="number" placeholder="Bonus Amount ($)" class="w-full bg-slate-800 p-3 rounded-xl">
                <textarea id="a-b-terms" placeholder="Terms (e.g. First FTD within 2h)" class="w-full bg-slate-800 p-3 rounded-xl text-sm"></textarea>
                <input id="a-goal" type="number" placeholder="Shift Goal ($)" class="w-full bg-slate-800 p-3 rounded-xl">
                <button onclick="saveAdminConfig()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Save Global Config</button>
            </div>

            <div class="bg-slate-900 p-4 rounded-2xl space-y-3">
                <p class="text-[10px] font-bold text-slate-500 uppercase">Break Controls</p>
                <button onclick="resetAllBreaks()" class="w-full bg-red-600/20 text-red-500 py-3 rounded-xl font-bold border border-red-500/30">RESET ALL AGENT TIMERS</button>
                <h4 class="text-xs font-bold mt-4">History Log</h4>
                <div id="a-b-history" class="space-y-2 text-[10px]"></div>
            </div>

            <h3 class="font-bold text-sm">Edit Transactions</h3>
            <div id="a-deals" class="space-y-2"></div>
        </div>
    </div>

    <div id="m-deal" class="fixed inset-0 bg-slate-950 z-[110] hidden p-6 flex-col">
        <div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-black">Register Deal</h2><button onclick="toggleModal('m-deal', false)">✕</button></div>
        <div class="space-y-4">
            <input id="f-cid" type="text" placeholder="Client ID" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800">
            <input id="f-amt" type="number" placeholder="Amount ($)" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800">
            <select id="f-method" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800"><option>Crypto</option><option>Wire</option><option>Stripe</option></select>
            <button onclick="submitDeal()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xl">SUBMIT</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let cache = null;
        let adminPass = '';

        async function refresh() {
            const res = await fetch('/api/dashboard');
            cache = await res.json();
            renderHome();
            renderBreaks();
            if(!document.getElementById('m-admin').classList.contains('hidden')) renderAdminStuff();
        }

        function renderHome() {
            const today = new Date().toISOString().split('T')[0];
            const daily = cache.deals.filter(d => d.created_at.startsWith(today));
            const total = daily.reduce((s, d) => s + d.amount, 0);
            
            document.getElementById('h-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('h-bar').style.width = `${Math.min((total/cache.config.goal)*100, 100)}%`;

            // Bounty Display
            if(cache.config.bounty_amt > 0) {
                document.getElementById('bounty-banner').classList.remove('hidden');
                document.getElementById('b-val').innerText = `$${cache.config.bounty_amt}`;
                document.getElementById('b-terms').innerText = cache.config.bounty_terms;
            } else {
                document.getElementById('bounty-banner').classList.add('hidden');
            }

            document.getElementById('h-deals').innerHTML = daily.map(d => `
                <div class="bg-slate-800/50 p-4 rounded-2xl flex justify-between items-center border border-slate-700/50">
                    <div><p class="font-bold text-sm">${d.agent_name}</p><p class="text-[9px] text-slate-500">${d.payment_method} • ${d.client_id}</p></div>
                    <p class="font-black text-blue-400">+$${d.amount}</p>
                </div>
            `).join('') || '<p class="text-center text-slate-600 text-xs py-10">No deals yet.</p>';
        }

        function renderBreaks() {
            document.getElementById('b-live').innerHTML = cache.active_breaks.map(b => {
                const start = new Date(b.start_time).getTime();
                const total = b.duration * 60;
                return `
                    <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                        <span class="font-bold text-sm">☕ ${b.agent_name}</span>
                        <span class="text-orange-400 font-mono text-xs font-bold timer" data-start="${start}" data-total="${total}">--:--</span>
                    </div>
                `;
            }).join('') || '<p class="text-center text-slate-600 text-[10px] py-4">Everyone is active.</p>';
        }

        function tick() {
            document.querySelectorAll('.timer').forEach(el => {
                const elapsed = Math.floor((Date.now() - parseInt(el.dataset.start)) / 1000);
                const rem = Math.max(0, parseInt(el.dataset.total) - elapsed);
                el.innerText = `${Math.floor(rem/60).toString().padStart(2, '0')}:${(rem%60).toString().padStart(2, '0')}`;
            });
        }

        function openAdmin() {
            adminPass = prompt("Admin Pass:");
            if(adminPass === "13012") {
                toggleModal('m-admin', true);
                document.getElementById('a-goal').value = cache.config.goal;
                document.getElementById('a-b-amt').value = cache.config.bounty_amt;
                document.getElementById('a-b-terms').value = cache.config.bounty_terms;
                renderAdminStuff();
            }
        }

        function renderAdminStuff() {
            document.getElementById('a-b-history').innerHTML = cache.history.map(h => `
                <div class="flex justify-between border-b border-slate-800 pb-1">
                    <span>${h.agent_name} (${h.duration}m)</span>
                    <span class="opacity-50">${new Date(h.started_at).toLocaleTimeString()}</span>
                </div>
            `).join('');

            document.getElementById('a-deals').innerHTML = cache.deals.slice(0, 10).map(d => `
                <div class="bg-slate-800 p-2 rounded flex justify-between text-[10px]">
                    <span>${d.agent_name}: $${d.amount}</span>
                    <button onclick="adminDelete(${d.id})" class="text-red-500">DEL</button>
                </div>
            `).join('');
        }

        async function resetAllBreaks() {
            if(!confirm("Are you sure? This kicks everyone off break and resets timers.")) return;
            await fetch('/api/admin/reset-breaks', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password: adminPass})});
            refresh();
        }

        async function saveAdminConfig() {
            const config = {
                goal: parseInt(document.getElementById('a-goal').value),
                bounty_amt: parseInt(document.getElementById('a-b-amt').value),
                bounty_terms: document.getElementById('a-b-terms').value
            };
            await fetch('/api/admin/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password: adminPass, config: config})});
            refresh();
            tg.showAlert("Config Updated!");
        }

        async function submitDeal() {
            const body = {
                agent_name: tg.initDataUnsafe.user?.first_name || "Agent",
                amount: parseFloat(document.getElementById('f-amt').value),
                client_id: document.getElementById('f-cid').value,
                payment_method: document.getElementById('f-method').value,
                deal_type: 'Deposit', client_email: 'n/a'
            };
            await fetch('/api/deal', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
            toggleModal('m-deal', false);
            refresh();
        }

        async function takeBreak(m) {
            const b = {user_id: tg.initDataUnsafe.user?.id || Date.now(), agent_name: tg.initDataUnsafe.user?.first_name || "Agent", duration: m, start_time: new Date().toISOString()};
            await fetch('/api/break', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)});
            refresh();
        }

        async function endMyBreak() {
            await fetch('/api/break/end', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id: tg.initDataUnsafe.user?.id})});
            refresh();
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'text-blue-500'));
            document.getElementById(`page-${p}`).classList.add('active');
            document.getElementById(`n-${p}`).classList.add('active');
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }
        
        setInterval(refresh, 10000);
        setInterval(tick, 1000);
        refresh();
    </script>
</body>
</html>
