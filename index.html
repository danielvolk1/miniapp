<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #020617; color: white; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .page { display: none; padding: 10px; padding-bottom: 120px; }
        .page.active { display: block; }
        /* Fix: Ensure inputs are always interactable */
        input, select, textarea { 
            pointer-events: auto !important; 
            user-select: text !important;
            background: #1e293b !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
        }
        .nav-item.active { color: #3b82f6; }
        .whale-card { border-left: 4px solid #f59e0b; background: rgba(245, 158, 11, 0.05); }
    </style>
</head>
<body class="font-sans">

    <header class="flex justify-between items-center px-4 py-2 bg-slate-900/90 border-b border-white/5 sticky top-0 z-50 backdrop-blur-md">
        <h1 class="font-black italic text-sm tracking-tighter">SHIFT<span class="text-blue-500">PRO</span></h1>
        <div class="flex items-center gap-3">
            <span id="header-total" class="text-xs font-bold text-blue-400">$0</span>
            <button onclick="openAdmin()" class="bg-slate-800 p-1.5 rounded-lg text-[10px] font-bold">⚙️</button>
        </div>
    </header>

    <main id="page-home" class="page active">
        <div class="bg-blue-600 p-6 rounded-3xl shadow-xl mb-4">
            <p class="text-[10px] font-bold opacity-70 uppercase">Daily Revenue</p>
            <h2 id="h-total" class="text-4xl font-black mb-2">$0</h2>
            <div class="bg-black/20 rounded-full h-1.5 mb-2"><div id="h-bar" class="bg-white h-full rounded-full transition-all duration-700 w-0"></div></div>
            <p id="pace-tracker" class="text-[9px] font-medium opacity-80"></p>
        </div>

        <div class="flex gap-2 mb-4">
            <input type="text" id="deal-search" oninput="renderHome()" placeholder="Search ID/Email..." class="flex-1 p-3 rounded-xl text-xs outline-none">
        </div>

        <div id="h-deals" class="space-y-2"></div>
    </main>

    <main id="page-stats" class="page">
        <div class="grid grid-cols-2 gap-2 mb-4">
            <div class="bg-slate-900 p-4 rounded-2xl border border-white/5">
                <p class="text-[9px] text-slate-500 font-bold uppercase">Average Deal</p>
                <p id="s-avg" class="text-lg font-black text-blue-400">$0</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-white/5">
                <p class="text-[9px] text-slate-500 font-bold uppercase">Deals Count</p>
                <p id="s-count" class="text-lg font-black text-emerald-400">0</p>
            </div>
        </div>
        <div id="stats-container" class="space-y-2"></div>
    </main>

    <main id="page-breaks" class="page">
        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="takeBreak(15)" class="bg-slate-900 p-4 rounded-2xl border border-white/5 text-xs font-bold">☕ 15m Break</button>
            <button onclick="takeBreak(45)" class="bg-slate-900 p-4 rounded-2xl border border-white/5 text-xs font-bold">🍔 45m Break</button>
        </div>
        <div class="bg-slate-900 rounded-2xl p-4 border border-white/5">
            <h3 class="text-xs font-bold text-slate-500 uppercase mb-3">Active Timers</h3>
            <div id="b-live" class="space-y-2"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-slate-900/95 border-t border-white/5 flex justify-around py-3 pb-8 z-50 backdrop-blur-md">
        <button onclick="nav('home')" id="n-home" class="nav-item active flex flex-col items-center gap-1"><span class="text-lg">🏠</span><span class="text-[9px] font-bold">HOME</span></button>
        <button onclick="nav('stats')" id="n-stats" class="nav-item flex flex-col items-center gap-1"><span class="text-lg">📊</span><span class="text-[9px] font-bold">STATS</span></button>
        <button onclick="nav('breaks')" id="n-breaks" class="nav-item flex flex-col items-center gap-1"><span class="text-lg">⏳</span><span class="text-[9px] font-bold">BREAKS</span></button>
    </nav>

    <button onclick="openDealModal()" class="fixed bottom-24 right-4 bg-blue-600 w-12 h-12 rounded-full shadow-2xl text-2xl z-40">+</button>

    <div id="m-deal" class="fixed inset-0 bg-slate-950 z-[100] hidden p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6 text-sm font-bold"><span>TRANSACTION</span><button onclick="closeDealModal()">✕</button></div>
        <div class="space-y-4">
            <input id="f-cid" type="text" placeholder="Client ID" class="w-full p-4 rounded-xl outline-none">
            <input id="f-email" type="email" placeholder="Client Email" class="w-full p-4 rounded-xl outline-none">
            <input id="f-amt" type="number" placeholder="Amount ($)" class="w-full p-4 rounded-xl outline-none">
            <div class="flex gap-2">
                <select id="f-type" class="flex-1 p-4 rounded-xl"><option>FTD</option><option>Deposit</option></select>
                <select id="f-method" class="flex-1 p-4 rounded-xl"><option>Crypto</option><option>Wire</option><option>Stripe</option></select>
            </div>
            <button onclick="submitDeal()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-sm">CONFIRM DEAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let cache = { deals: [], active_breaks: [], config: { goal: 10000 } };
        let adminKey = "";

        async function refresh() {
            const res = await fetch('/api/dashboard');
            cache = await res.json();
            renderHome();
            renderStats();
            renderBreaks();
        }

        function renderHome() {
            const search = document.getElementById('deal-search').value.toLowerCase();
            const total = cache.deals.reduce((s, d) => s + d.amount, 0);
            
            document.getElementById('h-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('header-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('h-bar').style.width = `${Math.min((total/cache.config.goal)*100, 100)}%`;
            
            const list = cache.deals.filter(d => d.client_id.toLowerCase().includes(search) || d.client_email.toLowerCase().includes(search));
            
            document.getElementById('h-deals').innerHTML = list.map(d => `
                <div class="bg-slate-900/50 p-4 rounded-2xl flex justify-between items-center border border-white/5 ${d.amount >= 1000 ? 'whale-card' : ''}">
                    <div>
                        <p class="text-xs font-bold">${d.agent_name} ${d.amount >= 1000 ? '🐳' : ''}</p>
                        <p class="text-[9px] opacity-50 uppercase">${d.deal_type} • ${d.payment_method}</p>
                    </div>
                    <p class="font-black text-blue-400 text-sm">+$${d.amount}</p>
                </div>
            `).join('');
        }

        function renderStats() {
            const agents = {};
            cache.deals.forEach(d => agents[d.agent_name] = (agents[d.agent_name] || 0) + d.amount);
            const sorted = Object.entries(agents).sort((a,b) => b[1]-a[1]);

            document.getElementById('stats-container').innerHTML = sorted.map(([name, amt], i) => `
                <div class="bg-slate-900 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <span class="text-xs font-bold">${i === 0 ? '🥇' : i+1+'.'} ${name}</span>
                    <span class="text-blue-400 font-black text-xs">$${amt.toLocaleString()}</span>
                </div>
            `).join('');
            
            document.getElementById('s-count').innerText = cache.deals.length;
            const avg = cache.deals.length ? (cache.deals.reduce((s,d)=>s+d.amount,0)/cache.deals.length).toFixed(0) : 0;
            document.getElementById('s-avg').innerText = `$${avg}`;
        }

        function renderBreaks() {
            document.getElementById('b-live').innerHTML = cache.active_breaks.map(b => `
                <div class="flex justify-between items-center p-3 bg-slate-950 rounded-xl border border-white/5">
                    <span class="text-xs font-bold">${b.agent_name}</span>
                    <div class="flex items-center gap-3">
                        <span class="text-orange-400 font-mono text-xs">TIMER RUNNING</span>
                        <button onclick="endBreak('${b.user_id}')" class="text-[10px] bg-red-500/10 text-red-500 px-2 py-1 rounded-md font-bold">STOP</button>
                    </div>
                </div>
            `).join('') || '<p class="text-[10px] opacity-30 text-center">No active breaks</p>';
        }

        async function submitDeal() {
            const deal = {
                agent_name: tg.initDataUnsafe.user?.first_name || "Agent",
                amount: parseFloat(document.getElementById('f-amt').value),
                client_id: document.getElementById('f-cid').value,
                client_email: document.getElementById('f-email').value,
                deal_type: document.getElementById('f-type').value,
                payment_method: document.getElementById('f-method').value
            };
            await fetch('/api/deal', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(deal)});
            tg.HapticFeedback.notificationOccurred('success');
            closeDealModal();
            refresh();
        }

        async function endBreak(uid) {
            await fetch('/api/break/end', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id: uid})});
            refresh();
        }

        async function takeBreak(m) {
            const b = {user_id: tg.initDataUnsafe.user?.id || 99, agent_name: tg.initDataUnsafe.user?.first_name || "Agent", duration: m, start_time: new Date().toISOString()};
            await fetch('/api/break', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)});
            refresh();
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`page-${p}`).classList.add('active');
            document.getElementById(`n-${p}`).classList.add('active');
        }

        function openDealModal() { document.getElementById('m-deal').classList.remove('hidden'); }
        function closeDealModal() { document.getElementById('m-deal').classList.add('hidden'); }
        
        setInterval(refresh, 15000);
        refresh();
    </script>
</body>
</html>
