<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .page { display: none; }
        .page.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans selection:bg-blue-500 pb-24">

    <header class="sticky top-0 z-40 bg-slate-900/80 backdrop-blur-md p-4 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-2">
            <span id="weather-icon">☀️</span>
            <h1 class="font-black tracking-tighter text-xl">SHIFT<span class="text-blue-500">PRO</span></h1>
        </div>
        <button onclick="openAdmin()" class="bg-red-500/20 text-red-400 px-3 py-1 rounded-full text-[10px] font-bold border border-red-500/30">ADMIN ⚡</button>
    </header>

    <div id="bounty-banner" class="bg-yellow-500 text-black text-center py-1 text-[10px] font-black uppercase tracking-widest animate__animated animate__pulse animate__infinite">
        No active bounty
    </div>

    <main id="page-home" class="page active p-4 space-y-6">
        <div class="glass p-6 rounded-[2.5rem] relative overflow-hidden">
            <div class="flex justify-between items-start mb-2">
                <p class="text-xs font-bold text-slate-400">SHIFT PROGRESS</p>
                <p id="shift-timer" class="text-[10px] font-mono bg-white/10 px-2 py-1 rounded">00:00:00</p>
            </div>
            <h2 id="total-revenue" class="text-5xl font-black italic">$0</h2>
            <div class="w-full bg-white/10 h-3 rounded-full mt-4"><div id="goal-fill" class="bg-blue-500 h-full rounded-full transition-all duration-1000" style="width: 0%"></div></div>
        </div>

        <div class="bg-slate-900/50 p-4 rounded-3xl border border-slate-800">
            <div class="flex gap-2 mb-3">
                <input id="shout-input" type="text" placeholder="Hype the team..." class="flex-1 bg-slate-800 rounded-xl px-3 text-xs outline-none">
                <button onclick="sendShout()" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold">🚀</button>
            </div>
            <div id="shout-list" class="space-y-2 text-[10px]"></div>
        </div>

        <div class="space-y-3">
            <h3 class="font-bold flex justify-between items-center px-1">
                <span>Today's Activity</span>
                <span onclick="triggerRoast()" class="text-[10px] text-blue-400 cursor-pointer">🃏 Roast Agent</span>
            </h3>
            <div id="deal-list" class="space-y-2"></div>
        </div>
    </main>

    <main id="page-stats" class="page p-4 space-y-4">
        <div class="flex gap-2 mb-4">
            <button onclick="switchStats('weekly')" id="btn-weekly" class="flex-1 bg-blue-600 py-2 rounded-xl text-xs font-bold">WEEKLY</button>
            <button onclick="switchStats('monthly')" id="btn-monthly" class="flex-1 bg-slate-800 py-2 rounded-xl text-xs font-bold">MONTHLY</button>
        </div>
        <div id="stats-content" class="space-y-3"></div>
    </main>

    <main id="page-breaks" class="page p-4 space-y-6">
        <div class="grid grid-cols-2 gap-3">
            <button onclick="startBreak(45)" class="bg-orange-500/10 border border-orange-500/20 p-5 rounded-3xl text-center active:scale-95 transition">
                <span class="text-3xl block mb-1">🍔</span><p class="font-bold text-orange-500">Big Break</p>
            </button>
            <button onclick="startBreak(15)" class="bg-blue-500/10 border border-blue-500/20 p-5 rounded-3xl text-center active:scale-95 transition">
                <span class="text-3xl block mb-1">☕</span><p class="font-bold text-blue-500">Small Break</p>
            </button>
        </div>
        <div class="bg-slate-900 rounded-3xl p-5 border border-slate-800">
            <h3 class="font-bold mb-4">Live Break Status</h3>
            <div id="breaks-list" class="space-y-3 text-sm"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-slate-900/90 backdrop-blur-lg border-t border-slate-800 flex justify-around p-3 pb-6 z-50">
        <button onclick="nav('home')" class="flex flex-col items-center gap-1 opacity-50 nav-btn" id="nav-home"><span>🏠</span><span class="text-[10px]">HOME</span></button>
        <button onclick="nav('stats')" class="flex flex-col items-center gap-1 opacity-50 nav-btn" id="nav-stats"><span>📊</span><span class="text-[10px]">STATS</span></button>
        <button onclick="nav('breaks')" class="flex flex-col items-center gap-1 opacity-50 nav-btn" id="nav-breaks"><span>☕</span><span class="text-[10px]">BREAKS</span></button>
    </nav>

    <div id="detail-modal" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-6">
        <div class="bg-slate-900 w-full max-w-sm rounded-[2rem] border border-slate-800 overflow-hidden animate__animated animate__zoomIn">
            <div class="p-6 space-y-4">
                <div class="flex justify-between items-center"><h2 class="font-black text-xl">Deal Info</h2><button onclick="closeModal()">✕</button></div>
                <div id="detail-body" class="space-y-3 text-sm"></div>
            </div>
            <button onclick="closeModal()" class="w-full bg-blue-600 py-4 font-bold uppercase">Back to Dashboard</button>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 z-[70] bg-slate-950 hidden p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-black">GOD MODE</h2><button onclick="closeAdmin()">✕</button></div>
        <div class="space-y-6">
            <div class="bg-slate-900 p-4 rounded-2xl">
                <p class="text-xs mb-2">Shift Goal ($)</p>
                <input id="admin-goal" type="number" class="w-full bg-slate-800 p-3 rounded-lg outline-none">
                <p class="text-xs mt-4 mb-2">Active Bounty</p>
                <input id="admin-bounty" type="text" class="w-full bg-slate-800 p-3 rounded-lg outline-none">
                <button onclick="saveConfig()" class="w-full bg-red-600 mt-4 py-3 rounded-xl font-bold">Update Everything</button>
            </div>
            <div class="space-y-2" id="admin-deals"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let cache = null;
        let adminPass = "";

        async function refresh() {
            const res = await fetch('/api/dashboard');
            cache = await res.json();
            renderHome();
            renderStats('weekly');
            renderBreaks();
            document.getElementById('bounty-banner').innerText = cache.config.bounty;
            updateShiftTimer();
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.add('opacity-50'));
            document.getElementById(`page-${p}`).classList.add('active');
            document.getElementById(`nav-${p}`).classList.remove('opacity-50');
            tg.HapticFeedback.selectionChanged();
        }

        function renderHome() {
            const today = new Date().toISOString().split('T')[0];
            const todayDeals = cache.deals.filter(d => d.created_at.startsWith(today));
            const total = todayDeals.reduce((s, d) => s + d.amount, 0);
            
            document.getElementById('total-revenue').innerText = `$${total.toLocaleString()}`;
            document.getElementById('goal-fill').style.width = `${Math.min((total/cache.config.goal)*100, 100)}%`;
            document.getElementById('weather-icon').innerText = total > (cache.config.goal/2) ? '🔥' : '☀️';

            document.getElementById('deal-list').innerHTML = todayDeals.reverse().map(d => `
                <div onclick="showDetail(${d.id})" class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 flex justify-between items-center active:scale-95 transition">
                    <div><p class="font-bold text-sm">${d.agent_name}</p><p class="text-[10px] text-slate-500">${d.deal_type} • ${d.payment_method}</p></div>
                    <p class="font-black text-emerald-400">+$${d.amount}</p>
                </div>
            `).join('');

            document.getElementById('shout-list').innerHTML = cache.shouts.map(s => `
                <div class="bg-blue-500/10 p-2 rounded-lg"><span class="font-bold text-blue-400">${s.agent_name}:</span> ${s.message}</div>
            `).join('');
        }

        function showDetail(id) {
            const d = cache.deals.find(x => x.id === id);
            document.getElementById('detail-body').innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="opacity-50">Agent</div><div>${d.agent_name}</div>
                    <div class="opacity-50">Amount</div><div class="text-emerald-400 font-bold">$${d.amount}</div>
                    <div class="opacity-50">Client ID</div><div>${d.client_id}</div>
                    <div class="opacity-50">Email</div><div class="truncate">${d.client_email}</div>
                    <div class="opacity-50">Method</div><div>${d.payment_method}</div>
                    <div class="opacity-50">Type</div><div>${d.deal_type}</div>
                    <div class="opacity-50">Time</div><div>${new Date(d.created_at).toLocaleTimeString()}</div>
                </div>
            `;
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function renderBreaks() {
            const list = document.getElementById('breaks-list');
            if(!cache.active_breaks.length) {
                list.innerHTML = `<p class="text-center text-slate-500 text-xs py-4">Everyone is making money! 💸</p>`;
                return;
            }
            list.innerHTML = cache.active_breaks.map(b => {
                const elapsed = Math.floor((Date.now() - new Date(b.start_time).getTime()) / 60000);
                const remaining = Math.max(0, b.duration - elapsed);
                return `
                    <div class="flex justify-between items-center bg-slate-950 p-3 rounded-xl border border-slate-800">
                        <span class="font-bold">☕ ${b.agent_name}</span>
                        <span class="font-mono text-orange-400">${remaining}m left</span>
                    </div>
                `;
            }).join('');
        }

        // Feature 5: Shift Countdown
        function updateShiftTimer() {
            const now = new Date();
            const end = new Date();
            end.setHours(20, 0, 0); // Assuming shift ends at 8 PM
            const diff = end - now;
            if(diff < 0) { document.getElementById('shift-timer').innerText = "SHIFT ENDED"; return; }
            const h = Math.floor(diff/3600000).toString().padStart(2,'0');
            const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
            const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            document.getElementById('shift-timer').innerText = `${h}:${m}:${s}`;
        }

        // Admin Security
        function openAdmin() {
            adminPass = prompt("Enter Key:");
            if(adminPass === "13012") {
                document.getElementById('admin-modal').classList.remove('hidden');
                renderAdminDeals();
            }
        }

        function renderAdminDeals() {
            document.getElementById('admin-deals').innerHTML = cache.deals.slice(-20).map(d => `
                <div class="bg-slate-900 p-3 rounded-lg flex justify-between items-center">
                    <div class="text-[10px]">${d.agent_name} - $${d.amount}</div>
                    <button onclick="deleteDeal(${d.id})" class="text-red-500 text-[10px] font-bold">DELETE</button>
                </div>
            `).join('');
        }

        async function deleteDeal(id) {
            if(!confirm("Delete this?")) return;
            await fetch(`/api/admin/deal/${id}?password=${adminPass}`, {method: 'DELETE'});
            refresh();
            renderAdminDeals();
        }

        async function sendShout() {
            const msg = document.getElementById('shout-input').value;
            if(!msg) return;
            await fetch('/api/shout', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({agent_name: tg.initDataUnsafe.user.first_name, message: msg})
            });
            document.getElementById('shout-input').value = '';
            refresh();
        }

        function triggerRoast() {
            const roasts = [
                "I've seen slower closers, but they were in a cemetery.",
                "Is your Client ID actually just your phone bill?",
                "Stop looking at the weather icon and start making calls.",
                "The only thing you're closing today is your laptop."
            ];
            tg.showAlert(roasts[Math.floor(Math.random()*roasts.length)]);
        }

        function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }
        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
        
        setInterval(refresh, 15000);
        setInterval(updateShiftTimer, 1000);
        refresh();
    </script>
</body>
</html>
