<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<body class="bg-slate-950 text-white">
    <div class="flex justify-around bg-slate-900 p-2 sticky top-0 z-50 border-b border-slate-800">
        <button onclick="showTab('daily')" class="text-xs font-bold">DAILY</button>
        <button onclick="showTab('weekly')" class="text-xs font-bold">WEEKLY</button>
        <button onclick="showTab('monthly')" class="text-xs font-bold">MONTHLY</button>
        <button onclick="openAdmin()" class="text-xs font-bold text-red-500">ADMIN ⚙️</button>
    </div>

    <div id="monthly-view" class="p-4 animate__animated animate__fadeIn">
        <canvas id="performanceChart" width="400" height="200"></canvas>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/95 z-[100] hidden p-6">
        <h2 class="text-2xl font-bold mb-4">Admin Security</h2>
        <input id="admin-pass" type="password" placeholder="Enter Password" class="w-full p-4 bg-slate-800 rounded-xl mb-4">
        <button onclick="verifyAdmin()" class="w-full bg-red-600 py-3 rounded-xl">Unlock Dashboard</button>
        
        <div id="admin-controls" class="hidden mt-8 space-y-4">
            <h3 class="text-lg">Update Global Target</h3>
            <input id="new-target" type="number" class="w-full p-2 bg-slate-800">
            <button onclick="saveTarget()" class="bg-green-600 px-4 py-2 rounded">Save Target</button>
        </div>
    </div>

    <script>
        function openAdmin() {
            document.getElementById('admin-panel').classList.remove('hidden');
        }

        function verifyAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === "13012") {
                document.getElementById('admin-controls').classList.remove('hidden');
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                alert("Access Denied");
            }
        }

        // Whale Alert Animation
        function triggerWhaleAlert(amount) {
            const el = document.createElement('div');
            el.className = "fixed top-20 left-0 w-full text-center z-[200] animate__animated animate__bounceInDown";
            el.innerHTML = `<div class="bg-blue-600 inline-block p-6 rounded-full shadow-2xl border-4 border-white">
                                <h1 class="text-4xl font-black">🐋 $${amount}!!</h1>
                            </div>`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }
    </script>
</body>
